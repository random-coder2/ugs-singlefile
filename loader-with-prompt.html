<template id="site-html">
  <html>
    <body>
      <script>
        launch();

        function launch() {
          // Prompt user for URL instead of hardcoded
          const userUrl = prompt("Enter CDN URL to load:", "https://cdn.jsdelivr.net/gh/random-coder2/ugs-singlefile@main/index.html");
          
          if (!userUrl) {
            console.log("User cancelled");
            return;
          }
          
          try {
            fetch(userUrl + "?t=" + Date.now())
              .then(response => response.text())
              .then(html => {
              document.documentElement.innerHTML = html;

              document.documentElement.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                  newScript.src = oldScript.src;
                } else {
                  newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
              });
            })
            .catch(error => {
              console.error('error:', error);
              alert('Failed to load: ' + error.message);
            });
          } catch (error) {
            console.error('error:', error);
          }
        }

      </script>
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5521219086088837"
              crossorigin="anonymous"></script>
    </body>
  </html>
</template>

<li>
  <a href="javascript:(()=>{
           const tmpl = document.getElementById('site-html');
           if (!tmpl) { alert('Template not found'); return; }
           const parser = new DOMParser();
           const doc = parser.parseFromString(tmpl.innerHTML, 'text/html');
           
           // Prompt for URL
           const userUrl = prompt('Enter URL to load:', 'https://cdn.jsdelivr.net/gh/random-coder2/ugs-singlefile@main/index.html');
           if (!userUrl) return;
           
           // Replace the hardcoded URL in the script
           let html = doc.documentElement.innerHTML;
           html = html.replace(/fetch\([^)]+\)/, "fetch('" + userUrl + "?t=' + Date.now())");
           
           const win = window.parent.document;
           win.documentElement.innerHTML = html;
           win.querySelectorAll('script').forEach(s => {
             const ns = win.createElement('script');
             if (s.src) ns.src = s.src;
             else ns.textContent = s.textContent;
             win.body.appendChild(ns);
           });
           })()">Website</a>
</li>
