<!DOCTYPE html>
<html>
<head>
    <title>UGS Custom</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;display:flex;height:100vh}
        .sidebar{width:70px;height:100vh;background:rgba(0,0,0,.4);padding:10px 5px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
        .nav-btn{width:50px;height:50px;border:none;border-radius:10px;background:#4a90e2;color:#fff;font-weight:bold;cursor:pointer}
        .nav-btn:hover{background:#5aa0f2}
        .nav-btn.empty{opacity:.3;background:#666}
        .main{flex:1;padding:20px;overflow-y:auto}
        h1{text-align:center;margin-bottom:20px}
        .search{width:100%;max-width:400px;padding:12px;border-radius:20px;border:none;margin:0 auto 20px;display:block}
        .section{margin-bottom:30px}
        .section h2{border-bottom:2px solid #4a90e2;padding-bottom:10px;margin-bottom:15px}
        .games{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
        .game-btn{padding:15px;background:#2d3561;border:1px solid #4a90e2;border-radius:10px;color:#fff;cursor:pointer;text-align:left}
        .game-btn:hover{background:#4a90e2}
        .loading{text-align:center;padding:50px;font-size:20px}
        .proxy-view{display:none}
        .proxy-view.active{display:block}
        .proxy-box{background:rgba(0,0,0,.3);padding:30px;border-radius:15px;text-align:center}
        .proxy-input{display:flex;gap:10px;max-width:600px;margin:20px auto}
        .proxy-input input{flex:1;padding:12px;border-radius:8px;border:none}
        .proxy-input button{padding:12px 24px;background:#e74c3c;border:none;border-radius:8px;color:#fff;cursor:pointer}
        iframe{width:100%;height:70vh;border:none;border-radius:10px;background:#fff}
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
        <h1>UGS Custom Games</h1>
        <input type="text" class="search" id="search" placeholder="Search games...">
        <div id="gamesView">
            <div class="loading" id="loading">Loading...</div>
            <div id="container"></div>
        </div>
        <div class="proxy-view" id="proxyView">
            <div class="proxy-box">
                <h2>Web Proxy</h2>
                <div class="proxy-input">
                    <input type="text" id="proxyUrl" placeholder="Enter URL...">
                    <button onclick="loadProxy()">Go</button>
                </div>
                <iframe id="proxyFrame"></iframe>
            </div>
        </div>
    </div>
<script>
const games=["cl8ballpool","clbabeltower","clcookieclicker","cl2048","clfamidash","clgeometrydashscratch","clcapybaraclicker","clspacebarclicker","clbitlife","clhobo","clhobo2","clhobo3","clhobo4","clhobo5","clhobo6","clhobo7","clamongus","clbalatrogba","clhollowknight","cldefendyournuts","cldefendyournuts2","cldrivemady","clmonkeymart","clgoodmonkeymart","clFIFA10","clFIFA11","clsubwaysurferssanfrancisco","clsubwaysurfersnewyork","clsubwaysurferslondon","clbasketrandom","clbasketrandomgood","clFNAF","clFNAF2","clFNAF3","clFNAF4","clfivenightsatepsteins","clbloonsTD1","clbloonsTD2","clbloonsTD3","clbloonsTD4","clbloonsTD5","clbloonsTD6scratch","clBTD1","clbtd5","clducklife","clducklife2","clducklife3","clducklife4","clducklifebattle","clducklifespace","clragdollarchers","clpokemonemerald","clpokemonfirered","clpokemonleafgreen","clpokemonruby","clpokemonsapphire","clpokeblack","clpokewhite","clpokeheartgold","clpokesoulsilver","clpokediamond","clpokepearl","clpokeplatinum","clpokemonunbound","clpokemonradicalred","clpoketcg1","clpoketcg2","clpokemonstadium","clpokemonstadium2","clblackjack","clsoundboard","clEaglercraftL_19_v0_7_0_Offline_Signed","cleaglercraft152"];
const chars="0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let byChar={};

function init(){
    try{
        chars.forEach(c=>byChar[c]=[]);
        games.forEach(g=>{
            const after=g.substring(2);
            if(after){
                const c=after[0].toUpperCase();
                if(byChar[c])byChar[c].push(g);
            }
        });
        renderSidebar();
        renderGames();
        document.getElementById("loading").style.display="none";
    }catch(e){
        console.error("Init error:",e);
        document.getElementById("loading").textContent="Error: "+e.message;
    }
}

function renderSidebar(){
    const sb=document.getElementById("sidebar");
    chars.forEach(c=>{
        const btn=document.createElement("button");
        btn.className="nav-btn"+(byChar[c].length?"":" empty");
        btn.textContent=c;
        btn.onclick=()=>scrollTo(c);
        sb.appendChild(btn);
    });
    const proxy=document.createElement("button");
    proxy.className="nav-btn";
    proxy.textContent="🌐";
    proxy.onclick=()=>showProxy();
    proxy.style.marginTop="auto";
    sb.appendChild(proxy);
}

function renderGames(){
    const cont=document.getElementById("container");
    chars.forEach(c=>{
        if(!byChar[c].length)return;
        const sec=document.createElement("div");
        sec.className="section";
        sec.id="sec-"+c;
        const h2=document.createElement("h2");
        h2.textContent=c;
        sec.appendChild(h2);
        const grid=document.createElement("div");
        grid.className="games";
        byChar[c].forEach(g=>{
            const b=document.createElement("button");
            b.className="game-btn";
            b.textContent=g;
            b.onclick=()=>playGame(g);
            grid.appendChild(b);
        });
        sec.appendChild(grid);
        cont.appendChild(sec);
    });
}

function scrollTo(c){
    showGames();
    const el=document.getElementById("sec-"+c);
    if(el)el.scrollIntoView({behavior:"smooth"});
}

function playGame(g){
    const url="https://cdn.jsdelivr.net/gh/random-coder2/ugs-singlefile/UGS-Files/"+encodeURIComponent(g+".html");
    fetch(url).then(r=>r.text()).then(html=>{
        const w=window.open("about:blank","_blank");
        if(w){w.document.open();w.document.write(html);w.document.close();}
    }).catch(e=>alert("Failed: "+e.message));
}

function showProxy(){
    document.getElementById("gamesView").style.display="none";
    document.getElementById("proxyView").classList.add("active");
}

function showGames(){
    document.getElementById("gamesView").style.display="block";
    document.getElementById("proxyView").classList.remove("active");
}

function loadProxy(){
    const u=document.getElementById("proxyUrl").value.trim();
    if(!u){alert("Enter URL");return;}
    const full=u.startsWith("http")?u:"https://"+u;
    document.getElementById("proxyFrame").src="https://api.allorigins.win/raw?url="+encodeURIComponent(full);
}

document.getElementById("search").addEventListener("input",function(e){
    const s=e.target.value.toLowerCase();
    document.querySelectorAll(".game-btn").forEach(b=>{
        b.style.display=b.textContent.toLowerCase().includes(s)?"block":"none";
    });
});

window.addEventListener("load",init);
</script>
</body>
</html>
